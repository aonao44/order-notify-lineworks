# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "025a11a0ffb9624d083e3f483998d7f6"
name = "Order Notify for LINE WORKS"
application_url = "https://order-notify-lineworks.fly.dev"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  # 注文・発送通知 Webhook（宣言的登録）
  [[webhooks.subscriptions]]
  topics = [ "orders/create", "orders/paid", "orders/cancelled", "fulfillments/create" ]
  uri = "/webhooks/shopify"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# Webhook subscriptions require read access to the relevant resources
scopes = "read_orders,read_shipping,read_fulfillments"

[[webhooks.subscriptions]]
compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
uri = "/webhooks"

[auth]
redirect_urls = [ "https://order-notify-lineworks.fly.dev/auth/callback" ]
