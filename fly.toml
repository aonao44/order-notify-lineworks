# fly.toml app configuration file generated for order-notify-lineworks on 2026-02-01T07:02:22+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'order-notify-lineworks'
primary_region = 'nrt'

[build]

[env]
  DATABASE_URL = "file:/data/sqlite.db"

[mounts]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
